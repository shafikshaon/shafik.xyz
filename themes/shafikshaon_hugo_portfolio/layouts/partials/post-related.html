{{ if .Site.Params.showRelatedPosts }}
{{ $related := .Site.RegularPages.Related . | first 5 }}
{{ with $related }}
<h4>Related post(s)</h4>
<ul class="related-post-list">
    {{ range . }}
    <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        {{ if .Params.tags }}
        <div class="blog-tags">
            {{ range .Params.tags }}
            <a href="/tags/{{ . | urlize }}/">#{{ . }}</a>&nbsp;
            {{ end }}
        </div>
        {{ end }}
    </li>
    {{ end }}
</ul>
{{ end }}
{{ end }}
